name: Build Examples Website
on: [push]
jobs:
  build-demo:
    name: Build Examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: yarn
      - name: Setup App
        run: sh setup.sh
      - name: Build Next App
        run: yarn demo:build