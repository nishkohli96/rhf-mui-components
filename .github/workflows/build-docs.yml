name: Build Docs Website v3
on: [push]
jobs:
  build-docs:
    name: Build Docs v3
    runs-on: ubuntu-latest
    env:
      GOOGLE_ANALYTICS_MEASUREMENT_ID: ${{ secrets.GOOGLE_ANALYTICS_MEASUREMENT_ID }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn
      - name: Setup App
        run: sh scripts/setup.sh
      - name: Build Docs
        run: yarn docs:build