name: Publish package on npm

on:
  push:
    tags:
      - 'v3.*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
      - name: Setup Node env
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Install Yarn
        run: npm install -g yarn@1.22.22
      - name: Install dependencies
        run: yarn install --frozen-lockfile
        # setup-node writes an .npmrc containing ${NODE_AUTH_TOKEN};
        # yarn 1.x errors on the unset placeholder, so define it (publishing
        # itself uses OIDC, so no real token is needed here).
        env:
          NODE_AUTH_TOKEN: ''
      - name: Build package
        run: yarn lib
      # Running the below command would ensure that latest
      # "v3.x" of this package would only be installed
      #
      # npm install @nish1896/rhf-mui-components@v3
      - name: Publish package on npm
        run: npm publish --tag latest-v3
        working-directory: packages/rhf-mui-components/dist
